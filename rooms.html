<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiches Salles — DungeonForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/shared.css">
<style>
.rooms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1rem;
}

.room-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.room-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  border-radius: 10px 0 0 10px;
}
.room-card.type-entry::before { background: #d4a040; }
.room-card.type-boss::before { background: #c94040; }
.room-card.type-special::before { background: #5a8a3a; }
.room-card.type-secret::before { background: #7a4a9a; }
.room-card.type-trap::before { background: #9a4a2a; }
.room-card.type-normal::before { background: #3a3660; }
.room-card:hover { border-color: rgba(180,120,40,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

.room-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 10px; gap: 8px;
}
.room-num {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.4rem;
  color: var(--gold-dim);
  line-height: 1;
  flex-shrink: 0;
}
.room-title {
  flex: 1;
}
.room-name {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  color: var(--gold);
  margin-bottom: 4px;
}
.room-badges { display: flex; gap: 4px; flex-wrap: wrap; }

.room-description {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--text-dim);
  line-height: 1.6;
  margin: 10px 0;
  padding: 10px 12px;
  border-left: 2px solid rgba(180,120,40,0.2);
  background: rgba(180,120,40,0.03);
  border-radius: 0 var(--radius) var(--radius) 0;
}

.room-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin: 10px 0;
}

.info-block {
  background: rgba(10,7,5,0.6);
  border: 1px solid rgba(80,60,30,0.2);
  border-radius: var(--radius);
  padding: 8px 10px;
}
.info-block-label {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 4px;
}
.info-block-val {
  font-family: 'Crimson Pro', serif;
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.4;
}

.monster-stat {
  display: inline-flex; gap: 6px;
  background: rgba(40,10,10,0.6);
  border: 1px solid rgba(160,60,60,0.2);
  border-radius: var(--radius);
  padding: 4px 8px;
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  color: #c87070;
  margin-top: 4px;
}
.monster-stat span { color: var(--text-dim); }

.room-notes {
  width: 100%;
  background: rgba(10,7,5,0.8);
  border: 1px solid rgba(80,60,30,0.2);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-family: 'Crimson Pro', serif;
  font-size: 0.9rem;
  padding: 8px 10px;
  resize: vertical;
  min-height: 56px;
  outline: none;
  margin-top: 8px;
  transition: border-color 0.2s;
}
.room-notes:focus { border-color: var(--border); }
.room-notes::placeholder { color: var(--text-muted); font-style: italic; }

.filter-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 0 0 1rem;
}
.filter-btn {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.filter-btn:hover { border-color: var(--gold-dim); color: var(--gold-dim); }
.filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,160,64,0.08); }

.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
}
.empty-state .big-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
.empty-state h2 { font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.5rem; }

.sidebar .section-label { margin-top: 1.25rem; }
.sidebar .section-label:first-child { margin-top: 0; }

.dungeon-summary {
  background: rgba(10,7,5,0.6);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem;
  margin-bottom: 1.25rem;
}
.summary-title {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  color: var(--gold);
  margin-bottom: 8px;
}
.summary-row {
  display: flex; justify-content: space-between;
  font-family: 'Crimson Pro', serif;
  font-size: 0.85rem;
  color: var(--text-dim);
  padding: 2px 0;
  border-bottom: 1px solid rgba(80,60,30,0.1);
}
.summary-row:last-child { border-bottom: none; }
.summary-row span:last-child { color: var(--gold-dim); font-weight: 600; }
</style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-logo" href="../index.html">⚒ DungeonForge</a>
  <ul class="nav-links">
    <li><a href="generator.html">Générateur</a></li>
    <li><a href="rooms.html" class="active">Fiches Salles</a></li>
    <li><a href="bestiary.html">Bestiaire</a></li>
    <li><a href="export.html">Export</a></li>
  </ul>
</nav>

<div class="page-layout">
  <aside class="sidebar">
    <div id="dungeon-summary-wrap">
      <div class="empty-state" style="padding:1rem 0">
        <div style="font-family:'Crimson Pro',serif;font-size:0.85rem;color:var(--text-muted)">Aucun donjon chargé</div>
        <a href="generator.html" class="btn btn-primary" style="display:inline-block;margin-top:10px;text-decoration:none">⚒ Générer</a>
      </div>
    </div>

    <div class="section-label">Filtres</div>
    <div class="filter-bar" id="filter-bar" style="flex-direction:column;gap:4px">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Toutes les salles</button>
      <button class="filter-btn" data-filter="entry" onclick="setFilter('entry',this)">🚪 Entrée</button>
      <button class="filter-btn" data-filter="boss" onclick="setFilter('boss',this)">💀 Boss / Trésor</button>
      <button class="filter-btn" data-filter="special" onclick="setFilter('special',this)">⭐ Spéciales</button>
      <button class="filter-btn" data-filter="trap" onclick="setFilter('trap',this)">⚠️ Pièges</button>
      <button class="filter-btn" data-filter="secret" onclick="setFilter('secret',this)">🔮 Secrets</button>
      <button class="filter-btn" data-filter="normal" onclick="setFilter('normal',this)">Salles normales</button>
    </div>

    <div class="section-label">Options</div>
    <div class="btn-group" style="flex-direction:column;gap:6px">
      <button class="btn btn-primary" onclick="generateDescriptions()">✦ Générer descriptions IA</button>
      <button class="btn" onclick="expandAll()">↕ Tout déplier</button>
      <button class="btn" onclick="window.print()">🖨 Imprimer</button>
    </div>
  </aside>

  <main class="main-content">
    <div id="rooms-container">
      <div class="empty-state">
        <div class="big-icon">📜</div>
        <h2>Aucun donjon chargé</h2>
        <p style="font-family:'Crimson Pro',serif;font-size:1rem;margin-bottom:1.5rem">Génère d'abord un donjon dans le générateur</p>
        <a href="generator.html" class="btn btn-primary" style="text-decoration:none">⚒ Aller au Générateur</a>
      </div>
    </div>
  </main>
</div>

<div class="toast"></div>

<script src="../js/data.js"></script>
<script>
let dungeon = null;
let activeFilter = 'all';

const DESCRIPTIONS = {
  entry: [
    "L'air chargé d'humidité et l'odeur de pierre mouillée accueillent les aventuriers. Des torches fumantes projettent des ombres dansantes sur les murs couverts de mousses. Une inscription gravée au seuil semble avertir ceux qui s'aventurent plus avant.",
    "L'entrée s'ouvre sur une pièce austère dont les murs portent les marques d'anciennes batailles. Le sol de pierre est inégal, usé par des générations de pas. Des anneaux de fer rouillé sont scellés dans les murs — peut-être pour attacher des prisonniers, ou des bêtes.",
  ],
  normal: [
    "La salle révèle ses secrets peu à peu à la lumière vacillante des torches. Les murs suintent d'humidité et portent des traces de peintures murales jadis colorées, aujourd'hui presque effacées. Le plafond bas amplifie le moindre bruit.",
    "Cette pièce sent le renfermé et la cendre froide. Des débris jonchent le sol — morceaux de mobilier brisé, ossements épars, tessons de poteries. Quelque chose s'est passé ici, il n'y a pas si longtemps.",
    "La salle est divisée par une rangée de colonnes épaisses dont certaines sont écroulées. Entre les blocs de pierre renversés, on aperçoit ce qui ressemble à des marques de lutte récente. Le silence qui y règne est pesant, presque tangible.",
  ],
  boss: [
    "La grande salle s'ouvre dans toute sa démesure. Le plafond se perd dans l'obscurité, et des chaînes rouillées pendent des ténèbres d'en haut. Au fond, sur un trône de pierre noire, siège une silhouette immobile — jusqu'à ce que les aventuriers franchissent le seuil.",
    "Cette chambre dégage une aura de puissance ancienne et corrompue. Les murs sont gravés de runes qui pulsent faiblement d'une lumière sombre. Au centre, un autel de basalte taillé est maculé de sécrétions noirâtres. Quelque chose de terrible attend ici.",
  ],
  special: [
    "Contrairement aux autres salles, celle-ci a été préservée avec soin. Les murs sont ornés de tapisseries encore relativement intactes, et des coffres de bois cerclés de fer s'alignent contre la paroi nord. L'air y est curieusement sec et parfumé.",
    "La salle baigne dans une douce lumière bleutée émanant de cristaux enchâssés dans les murs. Des étagères de pierre supportent encore quelques reliques et grimoires poussiéreux. Quelqu'un — ou quelque chose — a entretenu ce lieu.",
  ],
  secret: [
    "Seul un œil averti remarquera la légère irrégularité dans la maçonnerie, le souffle d'air froid qui filtre par une fissure invisible. Derrière ce qui semble être un mur solide se cache un passage soigneusement dissimulé.",
    "La pièce n'existe pas sur aucune carte connue. L'accès — un mécanisme à déclenchement par pression dans une pierre du couloir adjacent — n'a manifestement pas été utilisé depuis des années. Les toiles d'araignées sont épaisses comme du tissu.",
  ],
  trap: [
    "La salle paraît ordinaire au premier abord — mais quelque chose cloche. Les aventuriers expérimentés noteront les légères indentations dans les dalles du sol, les orifices à peine visibles dans les murs, les traces d'oxydation révélant des mécanismes anciens.",
    "Une odeur subtile, presque imperceptible, flotte dans cette pièce. Les murs sont striés de longues égratignures à hauteur d'homme — souvenirs d'anciens passages difficiles. Le plafond présente des marques de suie inexpliquées.",
  ]
};

function getDesc(type) {
  const list = DESCRIPTIONS[type] || DESCRIPTIONS.normal;
  return list[Math.floor(Math.random() * list.length)];
}

function loadDungeon() {
  dungeon = loadCurrent();
  if (!dungeon) return;
  renderSummary();
  renderRooms();
}

function renderSummary() {
  if (!dungeon) return;
  const theme = THEMES[dungeon.themeKey];
  const diff = DIFF_LABELS[dungeon.difficulty];
  const html = `<div class="dungeon-summary">
    <div class="summary-title">${theme.name}</div>
    <div class="summary-row"><span>Seed</span><span>#${dungeon.seed}</span></div>
    <div class="summary-row"><span>Difficulté</span><span>${diff.label}</span></div>
    <div class="summary-row"><span>Salles</span><span>${dungeon.rooms.length}</span></div>
    <div class="summary-row"><span>Taille</span><span>${dungeon.W}×${dungeon.W}</span></div>
  </div>`;
  document.getElementById('dungeon-summary-wrap').innerHTML = html;
}

function renderRooms() {
  if (!dungeon) return;
  const container = document.getElementById('rooms-container');
  const filtered = activeFilter === 'all' ? dungeon.rooms : dungeon.rooms.filter(r => r.type === activeFilter);

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="big-icon">🔍</div><h2>Aucune salle de ce type</h2></div>`;
    return;
  }

  const typeLabels = {entry:'Entrée',boss:'Boss · Trésor',special:'Spéciale',secret:'Secret',trap:'Piège',normal:'Normale'};
  container.innerHTML = `<div class="rooms-grid">${filtered.map(r => {
    const desc = r.description || getDesc(r.type);
    if (!r.description) r.description = desc;
    const monsHtml = r.monsters.length ? r.monsters.map(m => `
      <div>
        <span class="badge badge-red">${m.name}</span>
        <div class="monster-stat">CR ${m.cr} · <span>PV ${m.hp}</span> · <span>CA ${m.ac}</span> · <span>${m.type}</span></div>
      </div>`).join('') : `<span style="color:var(--text-muted);font-family:'Crimson Pro',serif;font-size:0.9rem;font-style:italic">Salle vide</span>`;
    const trapsHtml = r.traps.length ? r.traps.map(t=>`<span class="badge badge-ember">${t}</span>`).join(' ') : `<span style="color:var(--text-muted);font-family:'Crimson Pro',serif;font-size:0.85rem;font-style:italic">Aucun piège</span>`;
    const secretsHtml = r.secrets.length ? r.secrets.map(s=>`<span class="badge badge-purple">${s}</span>`).join(' ') : `<span style="color:var(--text-muted);font-family:'Crimson Pro',serif;font-size:0.85rem;font-style:italic">Aucun secret</span>`;
    const treasureHtml = r.treasure.length ? r.treasure.map(t=>`<span class="badge badge-gold">${t}</span>`).join(' ') : `<span style="color:var(--text-muted);font-family:'Crimson Pro',serif;font-size:0.85rem;font-style:italic">Pas de trésor</span>`;
    const badgeClass = {entry:'badge-gold',boss:'badge-red',special:'badge-green',secret:'badge-purple',trap:'badge-ember',normal:'badge-grey'};
    return `<div class="room-card type-${r.type}">
      <div class="room-header">
        <div class="room-num">${String(r.id).padStart(2,'0')}</div>
        <div class="room-title">
          <div class="room-name">${r.name}</div>
          <div class="room-badges"><span class="badge ${badgeClass[r.type]||'badge-grey'}">${typeLabels[r.type]||r.type}</span></div>
        </div>
      </div>
      <div class="room-description">${desc}</div>
      <div class="room-info-grid">
        <div class="info-block">
          <div class="info-block-label">⚔ Monstres</div>
          <div class="info-block-val">${monsHtml}</div>
        </div>
        <div class="info-block">
          <div class="info-block-label">💰 Trésor</div>
          <div class="info-block-val">${treasureHtml}</div>
        </div>
        <div class="info-block">
          <div class="info-block-label">⚠ Pièges</div>
          <div class="info-block-val">${trapsHtml}</div>
        </div>
        <div class="info-block">
          <div class="info-block-label">◆ Secrets</div>
          <div class="info-block-val">${secretsHtml}</div>
        </div>
      </div>
      <div>
        <div style="font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px">📝 Notes MJ</div>
        <textarea class="room-notes" placeholder="Ajoute tes notes de préparation..." onchange="saveNote(${r.id}, this.value)">${r.notes||''}</textarea>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function saveNote(id, val) {
  if (!dungeon) return;
  const r = dungeon.rooms.find(r=>r.id===id);
  if (r) { r.notes = val; saveDungeon(dungeon); }
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRooms();
}

function generateDescriptions() {
  if (!dungeon) { showToast('Aucun donjon chargé'); return; }
  dungeon.rooms.forEach(r => { r.description = getDesc(r.type); });
  saveDungeon(dungeon);
  renderRooms();
  showToast('Descriptions générées ✓');
}

function expandAll() { showToast('Toutes les fiches sont visibles'); }

loadDungeon();
</script>
</body>
</html>
